<div class="text-center">
    {% set total_to_pay = (order.kilos * order.price_per_kilo - order.down_payment)|round(2) %}
    <div class="alert alert-success py-1 small mb-2 shadow-sm">
        <strong>Υπόλοιπο: {{ total_to_pay }}€</strong> ({{ order.kilos }}kg)
    </div>
    
    <div class="d-flex flex-column gap-1">
        <div class="btn-group w-100 shadow-sm">
            <button class="btn btn-sm viber-btn py-2" 
                    onclick="sendMessage('viber', '{{order.phone}}', '{{order.kilos}}', '{{total_to_pay}}')">
                🟣 Viber
            </button>
            <button class="btn btn-sm btn-success py-2" 
                    style="background-color: #25D366; border:none;"
                    onclick="sendMessage('whatsapp', '{{order.phone}}', '{{order.kilos}}', '{{total_to_pay}}')">
                🟢 WA
            </button>
        </div>
        <div class="btn-group w-100 shadow-sm">
            <button class="btn btn-sm btn-dark py-2" 
                    onclick="sendMessage('sms', '{{order.phone}}', '{{order.kilos}}', '{{total_to_pay}}')">
                💬 SMS
            </button>
            <button class="btn btn-sm copy-btn py-2" 
                    onclick="copyToClipboard('{{order.kilos}}', '{{total_to_pay}}')">
                📋 Copy
            </button>
        </div>
    </div>
</div>

<script>
// Μία κεντρική συνάρτηση για όλα τα μηνύματα
function sendMessage(platform, phone, kilos, total) {
    // 1. Καθαρισμός τηλεφώνου
    let cleanPhone = phone.replace(/\D/g, '');
    if (cleanPhone.length === 10 && cleanPhone.startsWith('69')) {
        cleanPhone = '30' + cleanPhone;
    }

    // 2. Το κείμενο (Professional Tone)
    let text = "Γεια σας απο το ΑΝΑΪΣ! Η παραγγελια σας (" + kilos + "kg) ειναι ετοιμη. Υπολοιπο: " + total + "€. Σας περιμενουμε!";
    
    // 3. Αντιγραφή στο Clipboard (πάντα χρήσιμο ως backup)
    navigator.clipboard.writeText(text);

    // 4. Επιλογή πλατφόρμας
    let url = "";
    if (platform === 'viber') {
        url = "viber://chat?number=" + cleanPhone + "&draft=" + encodeURIComponent(text);
    } else if (platform === 'whatsapp') {
        // Το WhatsApp χρησιμοποιεί το wa.me link που είναι το πιο "Pro"
        url = "https://wa.me/" + cleanPhone + "?text=" + encodeURIComponent(text);
    } else if (platform === 'sms') {
        // Το SMS ανοίγει την εφαρμογή μηνυμάτων του κινητού
        url = "sms:" + cleanPhone + "?body=" + encodeURIComponent(text);
    }

    // Άνοιγμα του link
    if (url !== "") {
        window.location.href = url;
    }
}

function copyToClipboard(kilos, total) {
    let text = "Γεια σας απο το ΑΝΑΪΣ! Η παραγγελια σας (" + kilos + "kg) ειναι ετοιμη. Υπολοιπο: " + total + "€. Σας περιμενουμε!";
    navigator.clipboard.writeText(text).then(function() {
        alert("Αντιγράφηκε στο πρόχειρο!");
    });
}
</script>
